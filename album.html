<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Álbum · Deezer.Music</title>
  <meta name="description" content="Escucha las canciones del álbum en Deezer.Music." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="app-page">
  <header class="topbar"></header>

  <main class="app-main">
    <button id="backBtn" class="btn btn-ghost back-btn" type="button"></button>
    <div id="albumBanner" class="artist-banner album-hero"></div>

    <section class="section">
      <div class="section-head">
        <h2>Canciones</h2>
      </div>
      <p id="albumStatus" class="muted">Cargando canciones...</p>
      <div id="trackList" class="track-list"></div>
    </section>
  </main>

  <script src="./js/icons.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/offline.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/album.js"></script>
</body>
</html>
