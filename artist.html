<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artista · Deezer.Music</title>
  <meta name="description" content="Ficha del artista con su discografía completa en Deezer.Music." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="app-page">
  <header class="topbar"></header>

  <main class="app-main">
    <button id="backBtn" class="btn btn-ghost back-btn" type="button"></button>
    <div id="artistBanner" class="artist-banner"></div>
    <section class="section">
      <div class="section-head">
        <h2>Discografía</h2>
        <div id="starFilter" class="star-filter"></div>
      </div>
      <p id="artistStatus" class="muted">Cargando álbumes...</p>
      <div id="artistAlbums" class="grid album-grid"></div>
    </section>
  </main>

  <script src="./js/icons.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/offline.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/artist.js"></script>
</body>
</html>
