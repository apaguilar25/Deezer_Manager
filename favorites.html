<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis álbumes · Deezer.Music</title>
  <meta name="description" content="Tus álbumes guardados en Deezer.Music, siempre a un clic." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="app-page">
  <header class="topbar"></header>

  <main class="app-main">
    <button id="backBtn" class="btn btn-ghost back-btn" type="button"></button>

    <section class="section">
      <div class="section-head">
        <h2>Mis álbumes</h2>
        <div id="starFilter" class="star-filter"></div>
      </div>
      <p id="favStatus" class="muted"></p>
      <div id="favGrid" class="grid album-grid"></div>
    </section>
  </main>

  <script src="./js/icons.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/offline.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/favorites.js"></script>
</body>
</html>
