<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña · Deezer.Music</title>
  <meta name="description" content="Restablece la contraseña de tu cuenta Deezer.Music." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand" id="authBrand"></div>
      <h1 class="auth-title">RECUPERAR ACCESO</h1>
      <p class="auth-sub">Define una nueva contraseña para tu cuenta.</p>

      <form id="forgotForm" class="auth-form" novalidate>
        <label class="field">
          <span>Nombre de usuario</span>
          <input id="user" type="text" required />
        </label>
        <label class="field">
          <span>Nueva contraseña</span>
          <input id="pass" type="password" required />
        </label>
        <label class="field">
          <span>Confirmar contraseña</span>
          <input id="pass2" type="password" required />
        </label>

        <div id="forgotError" class="alert error" hidden></div>
        <div id="forgotOk" class="alert ok" hidden></div>

        <button type="submit" class="btn btn-primary btn-neon">
          <span class="btn-label">Actualizar</span>
        </button>
      </form>
      <div class="auth-links">
        <a href="./login.html">Volver a iniciar sesión</a>
      </div>
    </section>
  </main>

  <script src="./js/icons.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/forgot.js"></script>
  <script>
    document.getElementById('authBrand').innerHTML =
      Icons.logo('icon icon-lg neon') + '<span class="auth-wordmark">DEEZER<span class="brand-accent">.MUSIC</span></span>';
  </script>
</body>
</html>
