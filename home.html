<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio · Deezer.Music</title>
  <meta name="description" content="Descubre artistas en tendencia, álbumes recomendados y guarda tus favoritos en Deezer.Music." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="app-page">
  <header class="topbar"></header>

  <main class="app-main">
    <div id="pendingSyncBadge" class="alert warn" hidden></div>
    <div id="netStatus" class="net-pill online" aria-live="polite">En línea</div>

    <section class="home-search">
      <form id="homeSearchForm" role="search">
        <span id="homeSearchIcon" class="search-glyph"></span>
        <input id="homeSearchInput" type="search"
               placeholder="Busca un artista: Rosalía, Coldplay, BTS..." autocomplete="off" />
        <button type="submit" class="btn btn-primary btn-neon">Buscar</button>
      </form>
    </section>

    <section class="hello">
      <h2 id="hello">Hola</h2>
      <p class="muted">Elige por dónde continuar tu exploración.</p>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Tendencias en vivo</h2>
      </div>
      <div id="trendingMarquee" class="marquee"></div>
    </section>

    <section class="section">
      <div class="section-head"><h2>Álbumes recomendados</h2></div>
      <div id="albumsGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-head"><h2>Artistas destacados</h2></div>
      <div id="artistsGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="section-head"><h2 id="relatedTitle">Basado en tus búsquedas</h2></div>
      <div id="relatedEmpty" class="empty" hidden>Cuando empieces a buscar, aquí verás sugerencias personalizadas.</div>
      <div id="relatedGrid" class="grid"></div>
    </section>
  </main>

  <script src="./js/icons.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/offline.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/home.js"></script>
  <script>
    (function () {
      var u = Auth.currentUser();
      if (u) document.getElementById('hello').textContent = 'Hola, ' + u.name;
    })();
  </script>
</body>
</html>
