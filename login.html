<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · Deezer.Music</title>
  <meta name="description" content="Accede a Deezer.Music para descubrir artistas, guardar tus álbumes y calificarlos." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand" id="authBrand"></div>
      <h1 class="auth-title">BIENVENIDO</h1>
      <p class="auth-sub">Ingresa a tu universo musical.</p>

      <form id="loginForm" class="auth-form" novalidate>
        <label class="field">
          <span>Nombre de usuario</span>
          <input id="user" type="text" autocomplete="username" required />
        </label>
        <label class="field">
          <span>Contraseña</span>
          <input id="pass" type="password" autocomplete="current-password" required />
        </label>

        <div id="loginError" class="alert error" hidden></div>

        <button id="loginBtn" type="submit" class="btn btn-primary btn-neon">
          <span class="spinner" hidden></span>
          <span class="btn-label">Entrar</span>
        </button>
      </form>

      <div class="auth-links">
        <a href="./forgot.html">¿Olvidaste tu contraseña?</a>
        <a href="./signup.html">Crear cuenta</a>
      </div>
      <p class="auth-hint">Demo: <code>admin</code> / <code>1234</code></p>
    </section>
  </main>

  <script src="./js/icons.js"></script>
  <script src="./js/theme.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/offline.js"></script>
  <script src="./js/login.js"></script>
  <script>
    document.getElementById('authBrand').innerHTML =
      Icons.logo('icon icon-lg neon') + '<span class="auth-wordmark">DEEZER<span class="brand-accent">.MUSIC</span></span>';
  </script>
</body>
</html>
